<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JSON Generator</title>
    <style>
        body {
            font-family: sans-serif;
            background: #d8d8d8;
            padding: 20px;
            color: #333;
            font-size: 16px;
        }

        .grid {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .col {
            flex: 1;
        }

        .editor-container {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        .schema-save-form {
            margin-top: 20px;
            padding: 15px;
            background: #fff;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .alert {
            margin: 10px 0;
            padding: 15px;
            border-radius: 4px;
        }

        .alert-success { background-color: #d4edda; color: #155724; }
        .alert-danger { background-color: #f8d7da; color: #721c24; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/mode-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/theme-monokai.min.js"></script>
</head>
<body>

<div>
    <h2>Generator Schematu JSON</h2>
    <form id="mainForm" th:action="@{/generate}" method="post">
        <div>
            <label>Wybierz zapisany schemat:</label>
            <select id="schemaSelect" onchange="loadSchema()">
                <option value="">-- Wybierz --</option>
                <option th:each="s : ${schemas}"
                        th:value="${s.id}"
                        th:text="${s.name}"></option>
            </select>
        </div>
        <div class="grid">
            <div class="col">
                <h3>Wejście (JSON):</h3>
                <div id="jsonInputEditor" class="editor-container"></div>
                <textarea name="jsonInput" id="jsonInputHidden" style="display:none;" th:text="${jsonInput}"></textarea>
            </div>

            <div class="col">
                <h3>Wynik (Schema):</h3>
                <div id="schemaOutputEditor" class="editor-container"></div>
                <textarea name="schemaOutput" id="schemaOutputHidden" style="display:none;" th:text="${schemaOutput}"></textarea>
            </div>
        </div>
        <button type="button" onclick="submitForm('/generate')">Generuj schemat</button>
        <button type="button" onclick="submitForm('/checkJson')">Sprawdź poprawność JSON</button>
    </form>

    <div th:if="${isGenerated}" class="schema-save-form">
        <h4>Zapisz wygenerowany schemat</h4>
        <form th:action="@{/saveSchema}" method="post" onsubmit="syncEditorsForSave()">
            <input type="hidden" name="schemaData" id="saveSchemaData" th:value="${schemaOutput}"/>
            <input type="hidden" name="jsonInput" id="saveJsonInput" th:value="${jsonInput}"/>
            <label>Nazwa schematu:</label>
            <input type="text" name="schemaName" placeholder="Wprowadź nazwę..." required/>
            <button type="submit">Zapisz schemat</button>
        </form>
    </div>

    <div th:if="${message != null}" class="alert alert-success">
        <span th:text="${message}"></span>
    </div>

    <div th:if="${isValid != null}" class="alert" th:classappend="${isValid} ? 'alert-success' : 'alert-danger'">
        <span th:if="${isValid}">Twój JSON jest poprawny</span>
        <span th:if="${!isValid}">Twój JSON jest niepoprawny: <span th:text="${error}"/></span>
    </div>
</div>

<script>
    const jsonEditor = ace.edit("jsonInputEditor");
    jsonEditor.setTheme("ace/theme/monokai");
    jsonEditor.session.setMode("ace/mode/json");
    jsonEditor.setValue(document.getElementById('jsonInputHidden').value, -1);

    const schemaEditor = ace.edit("schemaOutputEditor");
    schemaEditor.setTheme("ace/theme/monokai");
    schemaEditor.session.setMode("ace/mode/json");
    schemaEditor.setValue(document.getElementById('schemaOutputHidden').value, -1);

    function syncEditors() {
        document.getElementById('jsonInputHidden').value = jsonEditor.getValue();
        document.getElementById('schemaOutputHidden').value = schemaEditor.getValue();
    }

    function syncEditorsForSave() {
        document.getElementById('saveSchemaData').value = schemaEditor.getValue();
        document.getElementById('saveJsonInput').value = jsonEditor.getValue();
    }

    function submitForm(action) {
        syncEditors();
        const form = document.getElementById('mainForm');
        form.action = action;
        form.submit();
    }

    function loadSchema() {
        const select = document.getElementById('schemaSelect');
        const schemaId = select.value;

        if (!schemaId) return;

        fetch('/api/schemas/' + schemaId)
            .then(response => response.text())
            .then(data => {
                schemaEditor.setValue(data, -1);
            })
            .catch(error => {
                console.error('Błąd:', error);
                alert('Błąd podczas pobierania schematu');
            });
    }
</script>
</body>
</html>
