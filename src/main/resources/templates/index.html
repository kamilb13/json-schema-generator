<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JSON Generator</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f9;
            padding: 20px;
            color: #333;
            font-size: 20px;
        }

        .grid {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .col {
            flex: 1;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            box-sizing: border-box;
            font-size: 18px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0056b3;
        }

        h3 {
            margin-top: 0;
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>

<div>
    <h2 style="margin-top:0">Generator Schematu JSON</h2>
    <form th:action="@{/generate}" method="post">
        <div class="grid">
            <div class="col">
                <h3>Wejście (JSON):</h3>
                <textarea name="jsonInput" th:text="${jsonInput}" rows="15" placeholder="Wklej JSON..."></textarea>
            </div>

            <div class="col" th:if="${schemaOutput}">
                <h3>Wynik (Schema):</h3>
                <textarea readonly rows="15" th:text="${schemaOutput}"></textarea>
            </div>
        </div>
        <button type="submit">Generuj schemat</button>
    </form>
    <div th:if="${error}" style="background-color: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem;">
        <strong>Error: </strong> <span th:text="${error}"></span>
    </div>
</div>

</body>
</html>
